# Bot configuration — read by bot-common/start-bot.sh and keepalive.sh
# Copy this to your bot's directory and customize.

BOT_NAME="my-bot"                                          # tmux session name
BOT_SERVICE="my-bot"                                       # systemd service name
BOT_LABEL="MY-BOT"                                         # label in logs and session names
BOT_DIR="/home/YOUR_USER/claudlobby/my-bot"                  # absolute path to this bot's directory
TELEGRAM_STATE_DIR="/home/YOUR_USER/.claude/channels/telegram-my-bot"  # isolated Telegram state

# Optional: separate Claude auth (for multi-account setups)
# CLAUDE_CONFIG_DIR="/home/YOUR_USER/.claude-work"

# Optional: model override (e.g., use Sonnet for cheaper bots)
# CLAUDE_EXTRA_FLAGS="--model sonnet"

# What the bot does on startup — read CLAUDE.md, announce itself
STARTUP_PROMPT="You just started up. Read your CLAUDE.md, then post a brief greeting in the Telegram group."
