# Manager bot configuration — read by bot-common/start-bot.sh and keepalive.sh
#
# Set BOT_NAME to your chosen manager session name (e.g., "manager", "atlas", "bachman").
# Keep this lowercase/hyphen-only — it's used as a tmux session name.

BOT_NAME="<BOT_NAME>"
BOT_SERVICE="<BOT_NAME>"
BOT_LABEL="<BOT_NAME_UPPER>"
BOT_DIR="<BOT_DIR>"
TELEGRAM_STATE_DIR="$HOME/.claude/channels/telegram-<BOT_NAME>"

# Export these so tg-post.sh and skills can find them
export MANAGER_TMUX="<BOT_NAME>"
export TELEGRAM_GROUP_CHAT_ID=""         # fill in after creating your group
export FLEET_ORG=""                      # GitHub org for scope filtering (optional)
export FLEET_STATE_PATH="<CLAUDLOBBY_ROOT>/bot-common/fleet-state.json"

# Optional: separate Claude Code auth
# CLAUDE_CONFIG_DIR="$HOME/.claude-<BOT_NAME>"

# Startup prompt — sent once after the session comes up. Keep it idle-safe.
STARTUP_PROMPT="Welcome back. Read your CLAUDE.md. Idle and await Telegram messages — do not post unprompted."
